name: Lint & Typecheck

on:
  push:
    branches: [main, dev, "feature/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install pre-commit
          pip install -e ".[dev]"
      - name: Run pre-commit
        run: pre-commit run --all-files

  typecheck:
    name: Typecheck (mypy strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run mypy
        run: |
          if [ -d "src" ]; then
            mypy src/ --strict
          else
            echo "src/ not yet created (Phase 0) — skipping typecheck"
          fi
